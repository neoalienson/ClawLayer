# ClawLayer Quick Router Only Configuration
# This config uses ONLY quick routers (zero-latency pattern matching)
# No embedding or LLM providers needed - instant responses!

# LLM Provider for fallback (when no quick router matches)
providers:
  remote:
    url: http://localhost:11434/v1/chat/completions
    type: openai
    provider_type: llm
    models:
      text: llama3.2

# Default provider for LLM fallback
defaults:
  text_provider: remote

# Server Configuration
server:
  port: 11435

# Router Configuration - Quick Routers Only
routers:
  # Fast routers (regex/logic-based) - zero-latency, no API calls
  fast:
    priority:
      - echo      # Echo tool execution results
      - command   # Detect "run:" command prefix
    
    # Echo router - instantly return tool execution results
    echo:
      enabled: true
    
    # Command router - instantly convert "run: <cmd>" to tool call
    command:
      enabled: true
      prefix: "run:"  # Detect commands starting with "run:"
  
  # Semantic routers disabled - all disabled for quick router only mode
  semantic:
    greeting:
      enabled: false
    
    summarize:
      enabled: false
