# ClawLayer Quick Router Only Configuration
# This config uses ONLY quick router (zero-latency pattern matching)
# No embedding or LLM providers needed - instant responses!

# LLM Provider for fallback (when no quick router matches)
providers:
  remote:
    url: http://localhost:11434/v1/chat/completions
    type: openai
    provider_type: llm
    models:
      text: llama3.2

# Default provider for LLM fallback
defaults:
  text_provider: remote

# Server Configuration
server:
  port: 11435

# Router Configuration - Quick Router Only
routers:
  # Fast routers (regex/logic-based) - zero-latency, no API calls
  handlers:
    priority:
      - quick
    
    # Quick router - pattern-based instant responses
    quick:
      enabled: true
      patterns:
        - pattern: Greet the user
          response: Hi
        - pattern: <conversation>.*</conversation>.*summarize
          response: '## Goal

            No user goal provided in the conversation.


            ## Constraints & Preferences

            - (none)


            ## Progress

            ### Done

            - [x] None


            ### In Progress

            - [ ] None


            ### Blocked

            - [ ] None


            ## Key Decisions

            - **None**


            ## Next Steps

            1. None


            ## Critical Context

            - (none)

            '
  
  # Semantic routers disabled - quick router only mode
  semantic:
    priority: []
